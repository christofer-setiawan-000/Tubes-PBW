<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/css/auth-dark.css" />
    <style> 
        .logo{font-weight:700}
    </style>
</head>
<body>
    <main class="auth-card">
        <header class="auth-header">
            <h1 class="auth-title">Selamat datang!</h1>
            <p class="auth-sub">Buat meme, beri vote, dan berkomentar setelah login!</p>
        </header>

        <section>
            <p class="error" th:if="${status}=='failed'">Username atau password salah.</p>
            <form class="auth-form" action="login" method="post">
                <div class="form-row">
                    <label for="username">Username / Email</label>
                    <input id="username" name="username" class="form-control" type="text" placeholder="Username atau Email" required />
                </div>

                <div class="form-row">
                    <label for="password">Password</label>
                    <input id="password" name="password" class="form-control" type="password" placeholder="Password" required />
                </div>

                <div class="form-row">
                    <button class="btn btn-primary" type="submit">Sign in</button>
                </div>
            </form>

            <a class="muted-link" href="/register">Belum punya akun? Daftar</a>
        </section>
    </main>
</body>
</html>
