<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Management - Moderator</title>
    <link href="/css/moderator-users.css" rel="stylesheet">
</head>

<body>
    <div class="navbar">
        <h2>User Management</h2>
        <div class="nav-buttons">
            <a href="/moderator" class="btn-back">Back to Panel</a>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <div class="container">
        
        <div class="header-section">
            <div th:if="${user != null}">
                <h1>List of Registered Users</h1>
                <p class="subtitle">Logged in as: <strong class="current-user-text" th:text="${user.username}">Admin</strong></p>
            </div>
            <div th:if="${user == null}">
                <p class="session-error">Session expired. <a href="/login">Login Again</a></p>
            </div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${userPage.content}">
                        <td>
                            <span th:text="${u.username}" class="username-cell">Username</span>
                        </td>
                        
                        <td th:text="${u.name}">User Name</td>
                        
                        <td th:text="${u.email}" class="email-cell">Email</td>
                        
                        <td>
                            <span class="role-badge" th:text="${u.role}" 
                                  th:classappend="${u.role == 'moderator'} ? 'role-mod' : 'role-user'">
                                role
                            </span>
                        </td>
                        
                        <td>
                            <div th:if="${user != null} and ${u.username != user.username} and ${u.role != 'moderator'}">
                                <form th:action="@{/moderator/users/delete}" method="post" 
                                      onsubmit="return confirm('Warning: Are you sure you want to delete this user permanently?');">
                                    <input type="hidden" name="username" th:value="${u.username}" />
                                    <button type="submit" class="btn-delete">
                                        Delete
                                    </button>
                                </form>
                            </div>
                            <div th:if="${user != null} and ${u.role == 'moderator'}">
                                <span class="self-label">(Moderator)</span>
                            </div>
                            <div th:unless="${user != null} and ${u.username != user.username}">
                                <span class="self-label">(You)</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination-area" th:if="${totalPages > 1}">
            <a th:if="${totalPages > 0}"
                th:href="@{/moderator/users(page=${currentPage -1})}"
                class="page-btn">
                Prev
            </a>

            <span class="page-info">
                Page<strong th:text="${currentPage + 1}">1</strong><span th:text="${totalPages}">10</span>
            </span>

            <a th:if="${currentPage < totalPages - 1}" 
               th:href="@{/moderator/users(page=${currentPage + 1})}" 
               class="page-btn">
               Next
            </a>
        </div>
    </div>

</body>
</html>
